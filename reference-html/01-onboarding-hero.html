<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaBiz — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F6FAF7;--surface:#FFFFFF;--ink:#0F3D2B;--muted:#6C7F73;--line:#E1E9E2;--coral:#1FC16B;--coral-soft:#DFF5E8;--navy-soft:#E7F2EA}
body{background:#E2EAE4;display:flex;justify-content:center;font-family:'Inter',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.screen{width:375px;height:812px;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column}
.statusbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;font-size:14.5px;font-weight:600}
.sb-icons{display:flex;gap:6px;align-items:center}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 0}
.dots{display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:99px;background:#CBDCD0}
.dot.active{width:22px;background:var(--ink)}
.skip{font-size:14px;font-weight:500;color:var(--muted);text-decoration:none}
.hero{position:relative;height:392px;margin-top:10px}
.ph{position:absolute;border-radius:22px;object-fit:cover;box-shadow:0 18px 40px rgba(15,61,43,.18)}
.pa{width:172px;height:224px;top:34px;left:26px;transform:rotate(-4deg)}
.pb{width:158px;height:200px;top:10px;right:24px;transform:rotate(3deg)}
.card{position:absolute;background:var(--surface);border-radius:16px;box-shadow:0 14px 34px rgba(15,61,43,.16);padding:11px 13px}
.msgcard{left:28px;bottom:6px;width:250px;z-index:4}
.msgcard .row{display:flex;align-items:center;gap:9px}
.msgcard img{width:32px;height:32px;border-radius:11px;object-fit:cover}
.msgcard .n{font-size:12.5px;font-weight:700}
.msgcard .flag{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.07em;color:var(--muted);background:var(--navy-soft);border-radius:5px;padding:2.5px 6px}
.msgcard .ar{margin-top:8px;font-size:12.5px;direction:rtl;text-align:right;color:var(--ink)}
.msgcard .fr{margin-top:6px;font-size:12px;color:var(--coral);font-weight:600;display:flex;align-items:center;gap:5px}
.pill{right:14px;bottom:128px;display:flex;align-items:center;gap:8px;border-radius:99px;padding:9px 14px;font-size:11.5px;font-weight:700;z-index:4}
.pill .avs{display:flex}
.pill .avs img{width:22px;height:22px;border-radius:99px;border:2px solid #fff;object-fit:cover;margin-left:-7px}
.pill .avs img:first-child{margin-left:0}
.badge{position:absolute;top:118px;left:50%;margin-left:-25px;width:50px;height:50px;border-radius:99px;background:var(--coral);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(31,193,107,.45);z-index:3}
.copy{padding:6px 26px 0;text-align:center}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:31px;line-height:1.16;letter-spacing:-.01em}
h1 em{font-style:italic;color:var(--coral)}
.sub{margin-top:11px;font-size:14.5px;line-height:1.55;color:var(--muted);max-width:300px;margin-left:auto;margin-right:auto}
.spacer{flex:1}
.cta{margin:0 24px;height:56px;border:none;border-radius:16px;background:linear-gradient(135deg,#2BD47D,#12A356);color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 10px 24px rgba(31,193,107,.35)}
.foot{margin:13px 0 30px;text-align:center;font-size:12.5px;color:var(--muted)}
.homebar{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:99px;background:var(--ink);opacity:.9}
</style>
</head>
<body>
<div class="screen">
  <div class="statusbar"><span>9:41</span>
    <div class="sb-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="#0F3D2B"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
      <svg width="16" height="11" viewBox="0 0 24 18" fill="none" stroke="#0F3D2B" stroke-width="2.6" stroke-linecap="round"><path d="M2 7a15 15 0 0 1 20 0"/><path d="M6 11a9.5 9.5 0 0 1 12 0"/><path d="M10 15a4.5 4.5 0 0 1 4 0"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" fill="none" stroke="#0F3D2B" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="8" rx="2" fill="#0F3D2B"/><path d="M23 4v4a2.2 2.2 0 0 0 0-4z" fill="#0F3D2B" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="topbar">
    <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
    <a class="skip" href="04-signin.html">Passer</a>
  </div>

  <div class="hero">
    <img class="ph pa" src="../images/hero2-a.png" alt="Commerçant souriant">
    <img class="ph pb" src="../images/hero2-b.png" alt="Entrepreneuse au téléphone">
    <div class="badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </div>
    <div class="card msgcard">
      <div class="row">
        <img src="../images/av-ahmed.png" alt="Ahmed">
        <span class="n">Ahmed K.</span>
        <span class="flag">AR</span>
      </div>
      <div class="ar">مرحباً، هل المنتج متاح؟</div>
      <div class="fr">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1FC16B" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Bonjour, le produit est-il disponible&nbsp;?
      </div>
    </div>
    <div class="card pill">
      <div class="avs">
        <img src="../images/av-isabella.png" alt="">
        <img src="../images/av-sofia.png" alt="">
        <img src="../images/av-carlos.png" alt="">
      </div>
      +128 clients à l’étranger
    </div>
  </div>

  <div class="copy">
    <h1>Vendez. Répondez.<br>Dans <em>toutes</em> les langues.</h1>
    <p class="sub">Vos clients écrivent en arabe, portugais ou chinois. Vous répondez en français. LinguaBiz s’occupe du reste.</p>
  </div>

  <div class="spacer"></div>
  <button class="cta" onclick="location.href='02-onboarding-traduction.html'">Suivant
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </button>
  <div class="foot">Déjà un compte&nbsp;? <b style="color:var(--coral);cursor:pointer" onclick="location.href='04-signin.html'">Se connecter</b></div>
  <div class="homebar"></div>
</div>
</body>
</html>
