<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaBiz — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F6FAF7;--ink:#0F3D2B;--coral:#1FC16B}
body{background:#E2EAE4;display:flex;justify-content:center;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.screen{width:375px;height:812px;background:linear-gradient(168deg,#0F3D2B 0%,#0D3526 55%,#092A1D 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.statusbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;font-size:14.5px;font-weight:600;color:#fff}
.sb-icons{display:flex;gap:6px;align-items:center}
.glow{position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(31,193,107,.16),transparent 65%);top:180px;left:50%;transform:translateX(-50%)}
.chip{position:absolute;padding:9px 16px;border-radius:99px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.85);font-size:13px;font-weight:500;backdrop-filter:blur(4px)}
.c1{top:150px;left:30px}
.c2{top:120px;right:38px}
.c3{top:560px;left:42px}
.c4{top:596px;right:30px}
.c5{top:230px;right:-8px;direction:rtl}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:2}
.mark{width:88px;height:88px;border-radius:28px;background:#F6FAF7;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.mark .dot{position:absolute;bottom:-6px;right:-6px;width:26px;height:26px;border-radius:99px;background:var(--coral);border:4px solid #0D3526}
.wordmark{margin-top:26px;font-family:'Fraunces',serif;font-weight:600;font-size:34px;color:#F6FAF7;letter-spacing:-.01em}
.tag{margin-top:10px;font-size:14px;color:rgba(255,255,255,.55)}
.tag em{font-style:italic;font-family:'Fraunces',serif;color:var(--coral)}
.loader{position:absolute;bottom:96px;display:flex;gap:7px}
.loader span{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.35)}
.homebar{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:99px;background:rgba(255,255,255,.85)}
</style>
</head>
<body>
<div class="screen" style="cursor:pointer">
  <div class="statusbar"><span>9:41</span>
    <div class="sb-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
      <svg width="16" height="11" viewBox="0 0 24 18" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"><path d="M2 7a15 15 0 0 1 20 0"/><path d="M6 11a9.5 9.5 0 0 1 12 0"/><path d="M10 15a4.5 4.5 0 0 1 4 0"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" fill="none" stroke="#fff" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="8" rx="2" fill="#fff"/><path d="M23 4v4a2.2 2.2 0 0 0 0-4z" fill="#fff" fill-opacity=".4"/></svg>
    </div>
  </div>

  <div class="glow"></div>
  <div class="chip c1">Bonjour 👋</div>
  <div class="chip c2">Hello</div>
  <div class="chip c3">Olá</div>
  <div class="chip c4">你好</div>
  <div class="chip c5">مرحباً</div>

  <div class="center">
    <div class="mark">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0F3D2B" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <div class="dot"></div>
    </div>
    <div class="wordmark">LinguaBiz</div>
    <div class="tag">Le business, <em>sans frontières</em></div>
  </div>

  <div class="loader"><span></span><span></span><span></span></div>
  <div class="homebar"></div>
</div>
</body>
</html>
