<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaBiz — Connecter WhatsApp Business</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F6FAF7;font-family:'Inter',sans-serif;color:#0F3D2B;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{max-width:400px;width:100%;background:#fff;border:1px solid #E1E9E2;border-radius:24px;padding:32px 26px;text-align:center;box-shadow:0 20px 46px rgba(15,61,43,.1)}
.mark{width:64px;height:64px;border-radius:20px;background:#0F3D2B;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;position:relative}
.mark::after{content:"";position:absolute;bottom:-5px;right:-5px;width:20px;height:20px;border-radius:99px;background:#1FC16B;border:3.5px solid #fff}
h1{font-family:'Fraunces',serif;font-size:24px;line-height:1.3}
p{margin-top:10px;font-size:14px;line-height:1.6;color:#6C7F73}
.steps{margin:20px 0;text-align:left;font-size:13px;color:#0F3D2B}
.steps li{margin:8px 0 8px 4px;padding-left:8px}
button{margin-top:8px;width:100%;height:54px;border:none;border-radius:15px;background:linear-gradient(135deg,#2BD47D,#12A356);color:#fff;font-family:'Inter',sans-serif;font-size:15.5px;font-weight:600;cursor:pointer;box-shadow:0 10px 24px rgba(31,193,107,.35)}
button:disabled{opacity:.6}
.status{margin-top:16px;font-size:13px;font-weight:600;min-height:20px}
.ok{color:#12A356}.err{color:#D14343}
</style>
</head>
<body>
<div class="card">
  <div class="mark">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  </div>
  <h1>Connecter WhatsApp Business</h1>
  <p>Votre numéro reste actif dans votre app WhatsApp Business. LinguaBiz ajoute la traduction par-dessus.</p>
  <ol class="steps">
    <li>Connectez-vous avec Facebook</li>
    <li>Choisissez « utiliser mon numéro existant »</li>
    <li>Scannez le QR code avec votre app WhatsApp Business</li>
  </ol>
  <button id="connect" disabled>Chargement…</button>
  <div class="status" id="status"></div>
</div>

<script>
  var APP_ID = '1032071186006523';
  var CONFIG_ID = 'REMPLACER_CONFIG_ID';
  var ONBOARD_URL = 'https://erelxhzrcmujpwldgrsm.supabase.co/functions/v1/wa-onboard';

  var lbtoken = (location.hash.match(/lbtoken=([^&]+)/) || [])[1] || '';
  var sessionInfo = null;
  var statusEl = document.getElementById('status');
  var btn = document.getElementById('connect');

  window.addEventListener('message', function (event) {
    if (!String(event.origin).endsWith('facebook.com')) return;
    try {
      var data = JSON.parse(event.data);
      if (data.type === 'WA_EMBEDDED_SIGNUP' && data.event === 'FINISH') {
        sessionInfo = data.data; // { phone_number_id, waba_id }
      }
    } catch (e) { /* messages non-JSON ignorés */ }
  });

  window.fbAsyncInit = function () {
    FB.init({ appId: APP_ID, autoLogAppEvents: true, xfbml: true, version: 'v25.0' });
    btn.disabled = false;
    btn.textContent = 'Connecter avec Facebook';
  };

  btn.addEventListener('click', function () {
    statusEl.textContent = '';
    if (!lbtoken) {
      statusEl.className = 'status err';
      statusEl.textContent = 'Ouvrez cette page depuis l’app LinguaBiz (Réglages → Connecter WhatsApp).';
      return;
    }
    FB.login(function (response) {
      var code = response && response.authResponse && response.authResponse.code;
      if (!code) {
        statusEl.className = 'status err';
        statusEl.textContent = 'Connexion annulée.';
        return;
      }
      var finish = function () {
        if (!sessionInfo) { setTimeout(finish, 500); return; }
        statusEl.className = 'status';
        statusEl.textContent = 'Finalisation…';
        fetch(ONBOARD_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: code,
            waba_id: sessionInfo.waba_id,
            phone_number_id: sessionInfo.phone_number_id,
            lbtoken: lbtoken,
          }),
        }).then(function (r) { return r.json(); }).then(function (d) {
          if (d.connected) {
            statusEl.className = 'status ok';
            statusEl.textContent = '✅ WhatsApp connecté ! Retournez dans LinguaBiz.';
          } else {
            statusEl.className = 'status err';
            statusEl.textContent = 'Erreur : ' + (d.error || 'inconnue');
          }
        }).catch(function () {
          statusEl.className = 'status err';
          statusEl.textContent = 'Erreur réseau — réessayez.';
        });
      };
      finish();
    }, {
      config_id: CONFIG_ID,
      response_type: 'code',
      override_default_response_type: true,
      extras: { sessionInfoVersion: '3', featureType: 'whatsapp_business_app_onboarding' },
    });
  });
</script>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/fr_FR/sdk.js"></script>
</body>
</html>
