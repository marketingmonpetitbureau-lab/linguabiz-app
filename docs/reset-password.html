<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>VTAP CHAT — Nouveau mot de passe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    background: #F6FAF7; color: #0F3D2B; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: #fff; border: 1px solid #E3EBE5; border-radius: 22px;
    padding: 34px 28px; max-width: 420px; width: 100%;
    box-shadow: 0 18px 45px rgba(15, 61, 43, .08);
  }
  h1 { font-size: 22px; margin-bottom: 6px; }
  p.sub { color: #5F7367; font-size: 14px; line-height: 1.5; margin-bottom: 22px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  input {
    width: 100%; height: 50px; border: 1px solid #E3EBE5; border-radius: 14px;
    padding: 0 15px; font-size: 15px; background: #FBFDFB; color: #0F3D2B;
  }
  input:focus { outline: 2px solid #2BD47D; border-color: transparent; }
  button {
    width: 100%; height: 52px; margin-top: 22px; border: 0; border-radius: 16px;
    background: linear-gradient(135deg, #2BD47D, #12A356); color: #fff;
    font-size: 15.5px; font-weight: 700; cursor: pointer;
  }
  button:disabled { opacity: .55; cursor: default; }
  .msg { margin-top: 16px; font-size: 13.5px; line-height: 1.5; text-align: center; }
  .msg.err { color: #D14343; }
  .msg.ok { color: #12A356; font-weight: 600; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .logo .badge {
    width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; background: linear-gradient(135deg, #2BD47D, #12A356);
    color: #fff; font-weight: 800; font-size: 20px;
  }
  .logo span { font-weight: 800; letter-spacing: .5px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><div class="badge">V</div><span>VTAP CHAT</span></div>
    <h1>Nouveau mot de passe</h1>
    <p class="sub">Choisissez un nouveau mot de passe pour votre compte, puis reconnectez-vous dans l'app.<br><em>Choose a new password, then sign in again in the app.</em></p>
    <form id="f">
      <label for="p1">Nouveau mot de passe / New password</label>
      <input id="p1" type="password" minlength="6" required autocomplete="new-password">
      <label for="p2">Confirmer / Confirm</label>
      <input id="p2" type="password" minlength="6" required autocomplete="new-password">
      <button id="btn" type="submit">Enregistrer / Save</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const sb = supabase.createClient(
    'https://erelxhzrcmujpwldgrsm.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZWx4aHpyY211anB3bGRncnNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODQyMzgsImV4cCI6MjA5OTk2MDIzOH0.g8dn9SSD67kVXZzzi2S4OSxKIYOAXx3VgeM704T8h1Q'
  );
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');

  // Le lien de l'e-mail contient les jetons de récupération dans l'URL :
  // supabase-js les détecte et ouvre la session automatiquement.
  let ready = false;
  sb.auth.onAuthStateChange((event, session) => {
    if (session) ready = true;
  });
  setTimeout(async () => {
    const { data } = await sb.auth.getSession();
    if (data.session) ready = true;
    if (!ready) {
      msg.className = 'msg err';
      msg.textContent = 'Lien invalide ou expiré — redemandez un e-mail depuis l\'app. / Invalid or expired link — request a new email from the app.';
      btn.disabled = true;
    }
  }, 1500);

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    if (p1 !== p2) { msg.className = 'msg err'; msg.textContent = 'Les mots de passe ne correspondent pas. / Passwords do not match.'; return; }
    btn.disabled = true;
    const { error } = await sb.auth.updateUser({ password: p1 });
    if (error) {
      msg.className = 'msg err'; msg.textContent = error.message; btn.disabled = false;
    } else {
      msg.className = 'msg ok';
      msg.textContent = '✓ Mot de passe changé ! Retournez dans l\'app VTAP CHAT et connectez-vous. / Password changed! Go back to the VTAP CHAT app and sign in.';
      document.getElementById('f').style.display = 'none';
    }
  });
</script>
</body>
</html>
